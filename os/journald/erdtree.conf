# /etc/systemd/journald.conf.d/erdtree.conf
# journald drop-in for Erdtree shell logging.
#
# INTENT
#   This drop-in ensures shell session output is persisted across reboots,
#   bounded in disk footprint, and held long enough to be useful for
#   post-incident diagnostics — without overwhelming journal storage on a
#   typical data-center node or homelab box.
#
# SEPARATE CONCERN
#   The product's own runtime audit trail is the append-only JSONL file at
#   /var/log/<tier>/audit.jsonl (written directly by the shell, not by journald).
#   That file logs every user operation with its English input, translated
#   command, output, and result. This drop-in is the SYSTEM-LEVEL journal
#   config for the shell process stdout/stderr — a different, lower-level layer.
#   Do not duplicate or replace the JSONL audit log here.
#
# INSTALL NOTE
#   Drop into /etc/systemd/journald.conf.d/ and run:
#       systemctl restart systemd-journald
#   Done by the installer (Phase 11), not by the systemd unit.
#
# I2: no "AI", "LLM", "model", "agent", or "agentic" in this file.
# I7: no "Rocky".

[Journal]

# Persist logs to /var/log/journal across reboots.
# "persistent" also keeps the current-boot copy in memory as usual.
Storage=persistent

# Cap journal storage so a chatty session can't fill the disk.
# Tune down on nodes with tight disk budgets.
SystemMaxUse=500M
SystemKeepFree=200M

# Per-file cap prevents a single runaway unit from consuming all 500 MB.
SystemMaxFileSize=50M

# Retain at most 90 days of logs; the JSONL audit log is the long-term record.
MaxRetentionSec=90day

# Compress entries to reduce storage footprint on embedded / SSD targets.
Compress=yes

# Rate-limit: allow bursts but prevent a flooded session from drowning other
# units in the journal. These defaults are already journald standard; listed
# explicitly here for clarity and to document the intent.
RateLimitIntervalSec=30s
RateLimitBurst=1000
